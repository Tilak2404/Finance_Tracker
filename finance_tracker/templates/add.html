{% extends "base.html" %}

{% block title %}Add Transaction | ExpenseStats{% endblock %}

{% block content %}
<div style="max-width:500px;margin:0 auto;background:#020617;padding:32px;border-radius:16px;border:1px solid #1e293b;box-shadow:0 20px 40px rgba(0,0,0,0.5), 0 0 20px rgba(34,197,94,0.08);transition:all 0.2s ease;">
    <h2 style="margin-top:0;margin-bottom:10px;text-align:center;font-size:28px;display:inline-block;width:100%;background:linear-gradient(90deg, #f8fafc, #bbf7d0);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">Add Transaction</h2>
    <p style="text-align:center;color:#94a3b8;margin-bottom:26px;line-height:1.7;">Enter a new income or expense record.</p>

    <form method="GET" action="/add" style="margin-bottom:22px;">
        <label for="transaction_type" style="display:block;margin-bottom:8px;color:#cbd5e1;font-weight:600;">Transaction Type</label>
        <select id="transaction_type" name="type" onchange="this.form.submit()" style="width:100%;padding:12px;border:none;border-radius:8px;background:#1e293b;color:white;box-sizing:border-box;outline:none;transition:all 0.2s ease;">
            <option value="expense" {% if type == 'expense' %}selected{% endif %}>Expense</option>
            <option value="income" {% if type == 'income' %}selected{% endif %}>Income</option>
        </select>
    </form>

    <form method="POST">
        <input type="hidden" name="type" value="{{ type }}">

        <label for="date" style="display:block;margin-bottom:8px;color:#cbd5e1;font-weight:600;">Date</label>
        <input type="date" id="date" name="date" value="{{ request.form.get('date') or today }}" style="width:100%;padding:12px;margin-bottom:6px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:white;box-sizing:border-box;outline:none;transition:all 0.2s ease;">
        <p style="margin:0 0 14px 0;color:#94a3b8;font-size:12px;">Defaults to today's date.</p>

        <label for="amount" style="display:block;margin-bottom:8px;color:#cbd5e1;font-weight:600;">Amount</label>
        <input type="number" id="amount" name="amount" step="0.01" min="0" value="{{ request.form.get('amount', '') }}" required style="width:100%;padding:12px;margin-bottom:14px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:white;box-sizing:border-box;outline:none;transition:all 0.2s ease;">

        {% if type == 'expense' %}
        <label for="category" style="display:block;margin-bottom:8px;color:#cbd5e1;font-weight:600;">Category</label>
        <select id="category" name="category" required style="width:100%;padding:12px;margin-top:10px;margin-bottom:14px;border:none;border-radius:8px;background:#1e293b;color:white;box-sizing:border-box;outline:none;transition:all 0.2s ease;">
            <option value="" disabled {% if not request.form.get('category') %}selected{% endif %}>Select Category</option>
            <option value="Food" {% if request.form.get('category') == 'Food' %}selected{% endif %}>Food</option>
            <option value="Transport" {% if request.form.get('category') == 'Transport' %}selected{% endif %}>Transport</option>
            <option value="Bills" {% if request.form.get('category') == 'Bills' %}selected{% endif %}>Bills</option>
            <option value="Shopping" {% if request.form.get('category') == 'Shopping' %}selected{% endif %}>Shopping</option>
            <option value="Entertainment" {% if request.form.get('category') == 'Entertainment' %}selected{% endif %}>Entertainment</option>
            <option value="Health" {% if request.form.get('category') == 'Health' %}selected{% endif %}>Health</option>
            <option value="Education" {% if request.form.get('category') == 'Education' %}selected{% endif %}>Education</option>
            <option value="Other" {% if request.form.get('category') == 'Other' %}selected{% endif %}>Other</option>
        </select>
        {% endif %}

        <label for="description" style="display:block;margin-bottom:8px;color:#cbd5e1;font-weight:600;">Description</label>
        <input type="text" id="description" name="description" value="{{ request.form.get('description', '') }}" placeholder="Optional note" style="width:100%;padding:12px;margin-bottom:14px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:white;box-sizing:border-box;outline:none;transition:all 0.2s ease;">

        <label for="tags" style="display:block;margin-bottom:8px;color:#cbd5e1;font-weight:600;">Tags</label>
        <input type="text" id="tags" name="tags" value="{{ request.form.get('tags', '') }}" placeholder="Enter tags (comma separated)" style="width:100%;padding:12px;margin-bottom:24px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:white;box-sizing:border-box;outline:none;transition:all 0.2s ease;">

        <button type="submit" style="width:100%;background:#22c55e;color:black;padding:12px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all 0.2s ease;box-shadow:0 12px 24px rgba(34,197,94,0.18);">Save Transaction</button>
    </form>

    <div style="text-align:center;margin-top:18px;">
        <a href="/" style="color:#22c55e;text-decoration:none;transition:all 0.2s ease;">Back to Dashboard</a>
    </div>
</div>
{% endblock %}
