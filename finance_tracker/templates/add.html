{% extends "base.html" %}

{% block title %}Add Transaction | Finance Tracker{% endblock %}

{% block content %}
<div class="card form-card">
    <h1 class="page-title center-text">Add Transaction</h1>
    <p class="page-subtitle center-text">Enter the transaction details below.</p>

    <form method="POST">
        <label for="amount">Amount</label>
        <input type="number" id="amount" name="amount" step="0.01" min="0" required>

        <label for="type">Type</label>
        <select id="type" name="type" required>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>

        <label for="category">Category</label>
        <input type="text" id="category" name="category" placeholder="Salary, Food, Rent">

        <label for="description">Description</label>
        <input type="text" id="description" name="description" placeholder="Optional description">

        <button type="submit">Save Transaction</button>
    </form>

    <div class="helper-links">
        <a href="/">Back to Dashboard</a>
    </div>
</div>
{% endblock %}
