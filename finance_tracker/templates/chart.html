{% extends "base.html" %}

{% block title %}Chart | Finance Tracker{% endblock %}

{% block content %}
<div class="card center-text">
    <h1 class="page-title">Expense Chart</h1>
    <p class="page-subtitle">A backend-generated donut chart showing how your expenses are distributed across categories.</p>
    <img class="chart-image" src="/static/chart.png" alt="Expenses by category donut chart">
    <div class="page-actions">
        <a class="btn btn-secondary" href="/">Back to Dashboard</a>
        <a class="btn btn-primary" href="/add">Add Transaction</a>
    </div>
</div>
{% endblock %}
