{% extends "base.html" %}

{% block title %}Chart | ExpenseStats{% endblock %}

{% block content %}
<div style="max-width:820px;margin:0 auto;background:#020617;padding:32px;border-radius:16px;border:1px solid #1e293b;box-shadow:0 20px 40px rgba(0,0,0,0.5), 0 0 20px rgba(34,197,94,0.08);text-align:center;transition:all 0.2s ease;">
    <h2 style="margin-top:0;font-size:30px;display:inline-block;background:linear-gradient(90deg, #f8fafc, #bbf7d0);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">Expenses by Category</h2>
    <p style="color:#94a3b8;margin-bottom:22px;line-height:1.7;">A backend-generated donut chart showing your current spending split.</p>

    <img src="/static/chart.png" alt="Expenses by category donut chart" style="width:320px;max-width:100%;margin-top:8px;">

    <div style="margin-top:30px;padding-top:24px;border-top:1px solid #1e293b;">
        <h2 style="display:inline-block;margin-top:0;font-size:28px;background:linear-gradient(90deg, #f8fafc, #bbf7d0);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">Expense Trend</h2>
        <p style="color:#94a3b8;margin-bottom:20px;line-height:1.7;">See how your expense totals move over time.</p>
        <img src="/static/trend.png" alt="Expense trend line chart" style="width:100%;max-width:520px;margin-top:10px;">
    </div>

    <div style="margin-top:26px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap;">
        <a href="/" style="display:inline-block;background:#1e293b;color:white;padding:10px 16px;border-radius:8px;text-decoration:none;border:1px solid #334155;transition:all 0.2s ease;">Back to Dashboard</a>
        <a href="/add" style="display:inline-block;background:#22c55e;color:black;padding:10px 16px;border-radius:8px;text-decoration:none;font-weight:600;transition:all 0.2s ease;box-shadow:0 12px 24px rgba(34,197,94,0.18);">Add Transaction</a>
    </div>
</div>
{% endblock %}
