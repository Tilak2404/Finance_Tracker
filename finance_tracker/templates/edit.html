{% extends "base.html" %}

{% block title %}Edit Transaction | Finance Tracker{% endblock %}

{% block content %}
<div class="card form-card">
    <h1 class="page-title center-text">Edit Transaction</h1>
    <p class="page-subtitle center-text">Update the transaction details below.</p>

    <form method="POST">
        <label for="amount">Amount</label>
        <input type="number" id="amount" name="amount" step="0.01" min="0" value="{{ transaction.amount }}" required>

        <label for="type">Type</label>
        <select id="type" name="type" required>
            <option value="income" {% if transaction.type == "income" %}selected{% endif %}>Income</option>
            <option value="expense" {% if transaction.type == "expense" %}selected{% endif %}>Expense</option>
        </select>

        <label for="category">Category</label>
        <input type="text" id="category" name="category" value="{{ transaction.category or '' }}" placeholder="Salary, Food, Rent">

        <label for="description">Description</label>
        <input type="text" id="description" name="description" value="{{ transaction.description or '' }}" placeholder="Optional description">

        <button type="submit">Update Transaction</button>
    </form>

    <div class="helper-links">
        <a href="/">Back to Dashboard</a>
    </div>
</div>
{% endblock %}
