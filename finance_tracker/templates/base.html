<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Finance Tracker{% endblock %}</title>
</head>
<body style="margin:0;font-family: Arial, sans-serif;background-color:#f4f6f8;">
    <div style="background:#2ecc71;color:white;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
        <h2 style="margin:0;">&#128176; Finance Tracker</h2>

        <div style="display:flex;align-items:center;flex-wrap:wrap;">
            {% if session.get('user_id') %}
            <a href="/" style="color:white;margin-right:15px;text-decoration:none;">Home</a>
            <a href="/add" style="color:white;margin-right:15px;text-decoration:none;">Add</a>
            <a href="/logout" style="color:white;text-decoration:none;">Logout</a>
            {% else %}
            <a href="/login" style="color:white;margin-right:15px;text-decoration:none;">Login</a>
            <a href="/register" style="color:white;text-decoration:none;">Register</a>
            {% endif %}
        </div>
    </div>

    <div style="max-width:1100px;margin:auto;margin-top:30px;padding:0 20px 30px;">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
